site_name: Dům Liberec
site_url: https://josefkubinek-star.github.io/dum-liberec/
site_dir: site

docs_dir: docs

use_directory_urls: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/custom-mobile-menu-v2.js
  - javascripts/drawer-toggle-fix.js
  - javascripts/pdf-header-icon.js

theme:
  name: material
  custom_dir: docs/overrides
  language: cs
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: slate
      primary: grey
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Přepnout na světlý režim
    - scheme: default
      primary: grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: Přepnout na tmavý režim
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
  font:
    text: Inter
    code: 'SF Mono'

nav:
  - Přehled: index.md
  - Zadání: 01_Zadani_a_cile/Zadani_projektu.md
  - Stav domu: 02_Stavajici_stav/Popis_stavajiciho_stavu.md
  - Architektura:
    - Koncept: 03_Architektura/Koncept.md
    - Úpravy místnost po místnosti: 03_Architektura/Popis_uprav_mistnost_po_mistnosti.md
  - Profese:
    - Kontakty: 04_Profese/Kontakty.md
    - Statika: 04_Profese/Statika/Zadani_pro_statika.md
    - Chytrá domácnost: 04_Profese/Chytra_domacnost/Rozpocet_a_doporuceni.md
  - Rozhodnutí: 05_Rozhodnuti_a_zmeny/Decision_log.md
  - Plán/rozpočet:
    - TODO: 06_TODO_a_plan/TODO_aktualni.md
    - Rozpočet: 08_Rozpocet_a_realizace/Rozpocet_hruby_odhad.md
  - Inspirace: 07_Inspirace/Inspirace.md
  - Digitální archiv:
      - Přehled a stav: 09_Digitalizovany_archiv/00_PLAN_A_STATUS.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.tasklist:
      custom_checkbox: true
